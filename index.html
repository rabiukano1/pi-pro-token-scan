<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIPRO — Generate Payment QR</title>
<meta name="description" content="Generate verified PIPRO token payment QR codes. Protects senders from fake tokens and wrong addresses.">
<link rel="icon" href="pipro-logo.png">
<!-- Bundled locally from the qrcode npm package: no CDN, works offline. -->
<script src="qrcode.js"></script>
<style>
  :root { --gold:#d4a437; --bg:#0d0b14; --card:#161226; --line:#2c2440; --muted:#9a8db5; }
  * { box-sizing: border-box; }
  body {
    margin:0; padding:24px 16px 48px; background:var(--bg); color:#fff;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display:flex; flex-direction:column; align-items:center;
  }
  .wrap { width:100%; max-width:460px; }
  header { text-align:center; margin-bottom:28px; }
  header img { width:120px; height:120px; border-radius:60px; }
  h1 { color:var(--gold); font-size:30px; letter-spacing:6px; margin:16px 0 4px; }
  .sub { color:var(--muted); font-size:12px; letter-spacing:3px; font-weight:600; }
  .desc { color:#b5aacd; font-size:13px; line-height:1.55; margin-top:14px; }
  label { display:block; color:var(--gold); font-size:13px; font-weight:700; margin:18px 0 6px; }
  .seg { display:flex; gap:8px; background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:5px; }
  .seg button {
    flex:1; margin:0; padding:11px; border-radius:10px; font-size:14px; font-weight:700;
    background:transparent; color:var(--muted); border:none; cursor:pointer;
  }
  .seg button[aria-pressed="true"] { background:var(--gold); color:var(--bg); }
  .seg button:hover { filter:none; color:#fff; }
  .seg button[aria-pressed="true"]:hover { color:var(--bg); }
  input {
    width:100%; padding:13px 14px; font-size:14px; color:#fff;
    background:var(--card); border:1.5px solid var(--line); border-radius:14px;
  }
  input::placeholder { color:#6c6285; }
  input:focus { outline:none; border-color:var(--gold); }
  .locked {
    display:flex; align-items:center; gap:8px; padding:13px 14px;
    background:var(--card); border:1.5px solid var(--gold); border-radius:14px;
  }
  .locked span:first-child {
    /* min-width:0 is required or the 44-char address refuses to shrink and
       pushes the whole page into horizontal overflow. */
    flex:1; min-width:0; color:var(--gold); font-size:13px; font-weight:600;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .locked span:last-child { flex:none; }
  .locked span:last-child { color:var(--muted); font-size:11px; font-weight:700; }
  button {
    width:100%; padding:16px; margin-top:24px; font-size:15px; font-weight:800;
    background:var(--gold); color:var(--bg); border:none; border-radius:14px; cursor:pointer;
  }
  button.alt { background:transparent; color:var(--gold); border:1.5px solid var(--gold); margin-top:10px; }
  button:hover { filter:brightness(1.08); }
  #err { color:#ff8080; font-size:13px; margin-top:12px; min-height:18px; text-align:center; }
  #card {
    display:none; margin-top:28px; padding:24px; text-align:center;
    background:var(--bg); border:1.5px solid var(--gold); border-radius:20px;
  }
  .brand { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px; }
  .brand img { width:36px; height:36px; border-radius:18px; }
  .brand span { color:var(--gold); font-size:20px; font-weight:800; letter-spacing:4px; }
  /* Association name must stay on one line, so it shrinks rather than wraps. */
  .assoc {
    color:#fff; font-size:clamp(11px, 3.4vw, 14px); font-weight:800;
    letter-spacing:1px; white-space:nowrap; margin-bottom:3px;
  }
  .motto {
    color:var(--gold); font-size:clamp(9px, 2.8vw, 11px); font-weight:700;
    letter-spacing:1px; white-space:nowrap; margin-bottom:16px;
  }
  .qrbox { background:#fff; border-radius:16px; padding:14px; display:inline-block; line-height:0; }
  .qrbox canvas { display:block; width:230px; height:230px; }
  #owner { margin-top:14px; font-size:18px; font-weight:800; }
  .badge {
    display:inline-block; margin-top:10px; padding:6px 14px; border-radius:999px;
    background:var(--gold); color:var(--bg); font-size:12px; font-weight:800;
  }
  .note { margin-top:12px; color:#b5aacd; font-size:11px; line-height:1.5; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="pipro-logo.png" alt="PIPRO">
    <h1>PIPRO</h1>
    <div class="sub">P2P COMMUNITY</div>
    <p class="desc">
      Generate verified token payment QR codes. Every transfer is pre-filled with
      the official token contract — protecting you from fake tokens and wrong addresses.
    </p>
  </header>

  <label>QR type</label>
  <div class="seg" role="group" aria-label="QR type">
    <button id="tabMerchant" aria-pressed="true">Marchant</button>
    <button id="tabMember" aria-pressed="false">Member</button>
  </div>

  <!-- Text is set from TYPES on load so the spelling lives in exactly one place. -->
  <label for="name" id="nameLabel"></label>
  <input id="name" placeholder="e.g. Aminu" autocomplete="off">

  <label for="wallet">Your wallet address</label>
  <input id="wallet" placeholder="Receiver wallet address" autocomplete="off" spellcheck="false">

  <label for="amount">Amount (optional)</label>
  <input id="amount" placeholder="Leave empty to let sender choose" inputmode="decimal">

  <label>PIPRO token contract (mint)</label>
  <div class="locked"><span id="mintText"></span><span>&#128274; Locked</span></div>

  <button id="go">Generate QR</button>
  <div id="err"></div>

  <div id="card">
    <div class="brand"><img src="pipro-logo.png" alt=""><span>PIPRO</span></div>
    <div class="assoc">PI PRO AREWA ASSOCIATION</div>
    <div class="motto">MOTTO: BAHAUSE BA WASABA</div>
    <div class="qrbox"><canvas id="qr"></canvas></div>
    <div id="owner"></div>
    <div class="badge" id="badge"></div>
    <p class="note" id="note"></p>
  </div>
  <button class="alt" id="dl" style="display:none">Download QR image</button>
</div>

<script>
// Same rules as the mobile app (src/solanaPay.ts) so both produce identical QRs.
const PIPRO_MINT = '7hU4hrLtr2dxGDBy56HQo6NF2u19FA1k4rM8nJQ5ceFk';
const BASE58 = /^[1-9A-HJ-NP-Za-km-z]{32,44}$/;

function buildUrl(recipient, label, amount) {
  if (!BASE58.test(recipient)) throw new Error('Invalid wallet address');
  const amountPart = amount ? '&amount=' + amount : '';
  return 'solana:' + recipient + '?spl-token=' + PIPRO_MINT + amountPart +
         '&label=' + encodeURIComponent(label.trim());
}

// Merchant and member QRs pay out identically — only the wording differs.
// A member must never be labelled an authorized merchant.
const TYPES = {
  merchant: {
    nameLabel: 'Marchant / wallet owner name',
    badge: '✓ Authorized Marchant by PIPRO',
    note: 'Scan with your Solana wallet to send verified PIPRO tokens safely — ' +
          'no fakes, no wrong addresses.',
    file: 'pipro-marchant-qr.png',
  },
  member: {
    nameLabel: 'Member name',
    badge: '✓ PIPRO Community Member',
    note: 'Scan with your Solana wallet to send this member PIPRO tokens safely — ' +
          'no fakes, no wrong addresses.',
    file: 'pipro-member-qr.png',
  },
};
let qrType = 'merchant';

document.getElementById('mintText').textContent = PIPRO_MINT;

const $ = id => document.getElementById(id);

function setType(t) {
  qrType = t;
  $('tabMerchant').setAttribute('aria-pressed', String(t === 'merchant'));
  $('tabMember').setAttribute('aria-pressed', String(t === 'member'));
  $('nameLabel').textContent = TYPES[t].nameLabel;
  // Regenerating is the caller's job; hide any stale card so the badge on
  // screen always matches the selected type.
  $('card').style.display = $('dl').style.display = 'none';
}
$('tabMerchant').onclick = () => setType('merchant');
$('tabMember').onclick = () => setType('member');
setType('merchant'); // seed the label from TYPES rather than duplicating it in HTML

$('go').onclick = () => {
  const err = $('err'), card = $('card'), dl = $('dl');
  err.textContent = '';
  const wallet = $('wallet').value.trim();
  const name = $('name').value;
  const amount = $('amount').value.trim();

  if (amount && !/^\d+(\.\d+)?$/.test(amount)) {
    err.textContent = 'Amount must be a number.';
    card.style.display = dl.style.display = 'none';
    return;
  }
  let url;
  try {
    url = buildUrl(wallet, name, amount);
  } catch (e) {
    err.textContent = e.message;
    card.style.display = dl.style.display = 'none';
    return;
  }
  // High error correction so the QR stays readable when printed or resized.
  QRCode.toCanvas($('qr'), url, { width: 230, margin: 1, errorCorrectionLevel: 'H' }, e => {
    if (e) { err.textContent = 'Could not render QR.'; return; }
    $('owner').textContent = name.trim();
    $('badge').textContent = TYPES[qrType].badge;
    $('note').textContent = TYPES[qrType].note;
    card.style.display = 'block';
    dl.style.display = 'block';
  });
};

$('dl').onclick = () => {
  const a = document.createElement('a');
  a.download = TYPES[qrType].file;
  a.href = $('qr').toDataURL('image/png');
  a.click();
};
</script>
</body>
</html>
