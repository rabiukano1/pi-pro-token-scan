<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIPRO — Pay</title>
<meta name="description" content="Open this payment in your Solana wallet.">
<link rel="icon" href="pipro-logo.png">
<style>
  :root { --gold:#d4a437; --bg:#0d0b14; --card:#161226; --line:#2c2440; --muted:#9a8db5; }
  * { box-sizing: border-box; }
  body {
    margin:0; padding:28px 16px 48px; min-height:100vh; background:var(--bg); color:#fff;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display:flex; flex-direction:column; align-items:center;
  }
  .wrap { width:100%; max-width:420px; text-align:center; }
  img.logo { width:88px; height:88px; border-radius:44px; }
  h1 { color:var(--gold); font-size:24px; letter-spacing:5px; margin:14px 0 2px; }
  .sub { color:var(--muted); font-size:11px; letter-spacing:3px; font-weight:600; margin-bottom:22px; }
  .card {
    background:var(--card); border:1.5px solid var(--gold); border-radius:18px;
    padding:22px; text-align:left;
  }
  .row { margin-bottom:14px; }
  .row:last-child { margin-bottom:0; }
  .k { color:var(--gold); font-size:11px; font-weight:700; letter-spacing:1px; margin-bottom:4px; }
  .v { font-size:15px; font-weight:700; word-break:break-all; }
  .v.addr { font-family: ui-monospace, Menlo, monospace; font-size:13px; font-weight:500; color:#e5e0f0; }
  button, a.btn {
    display:block; width:100%; text-align:center; text-decoration:none; box-sizing:border-box;
    padding:16px; margin-top:16px; font-size:15px; font-weight:800; cursor:pointer;
    background:var(--gold); color:var(--bg); border:none; border-radius:14px;
  }
  .altbtn { background:transparent; color:var(--gold); border:1.5px solid var(--gold); font-weight:700; }
  .ghostbtn { background:transparent; color:var(--muted); border:1.5px solid var(--line); font-weight:700; }
  #err { color:#ff8080; font-size:13px; margin-top:16px; }
  .fallback { margin-top:26px; padding-top:20px; border-top:1px solid var(--line); text-align:left; }
  .fallback h2 { font-size:12px; color:var(--muted); letter-spacing:1px; margin:0 0 12px; font-weight:700; }
  .wallets { display:flex; gap:10px; margin-top:10px; }
  .wallets a { flex:1; }
  .mint { margin-top:20px; font-size:10px; color:#6c6285; text-align:center; word-break:break-all; }
  .toast {
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%);
    background:var(--gold); color:var(--bg); padding:10px 18px; border-radius:999px;
    font-size:13px; font-weight:700; opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="pipro-logo.png" alt="PIPRO">
  <h1>PIPRO</h1>
  <div class="sub">P2P COMMUNITY</div>

  <div id="content"></div>
</div>
<div class="toast" id="toast">Copied</div>

<script>
// Same locked mint as the app and the QR generator — never taken from the
// URL, so a shared link can't be edited to redirect payment to another token.
const PIPRO_MINT = '7hU4hrLtr2dxGDBy56HQo6NF2u19FA1k4rM8nJQ5ceFk';
const BASE58 = /^[1-9A-HJ-NP-Za-km-z]{32,44}$/;

const qs = new URLSearchParams(location.search);
const to = (qs.get('to') || '').trim();
const amount = (qs.get('amount') || '').trim();
const label = (qs.get('label') || '').trim();

const content = document.getElementById('content');
const toast = document.getElementById('toast');

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1400);
}

function copy(text, what) {
  navigator.clipboard?.writeText(text).then(() => showToast(what + ' copied'))
    .catch(() => showToast('Could not copy'));
}

if (!BASE58.test(to)) {
  content.innerHTML = '<div id="err">This payment link is missing or has an invalid wallet address.</div>';
} else {
  const amountOk = !amount || /^\d+(\.\d+)?$/.test(amount);
  const solanaUri = 'solana:' + to + '?spl-token=' + PIPRO_MINT +
    (amountOk && amount ? '&amount=' + amount : '') +
    '&label=' + encodeURIComponent(label);
  const short = to.slice(0, 6) + '…' + to.slice(-6);

  content.innerHTML = `
    <div class="card">
      ${label ? `<div class="row"><div class="k">TO</div><div class="v">${label}</div></div>` : ''}
      <div class="row">
        <div class="k">WALLET ADDRESS</div>
        <div class="v addr">${short}</div>
      </div>
      ${amountOk && amount ? `<div class="row"><div class="k">AMOUNT</div><div class="v">${amount} PIPRO</div></div>` : ''}
    </div>
    <button id="openBtn">Open in Solana Wallet</button>
    <p style="color:var(--muted);font-size:12px;margin-top:10px">
      Works with Phantom, Solflare, and any wallet that supports Solana Pay.
    </p>

    <div class="fallback">
      <h2>NO WALLET APP OPEN? COPY INSTEAD</h2>
      <button class="altbtn" id="copyAddrBtn">📋 Copy wallet address</button>
      ${amountOk && amount ? `<button class="ghostbtn" id="copyAmtBtn">📋 Copy amount (${amount})</button>` : ''}
    </div>

    <div class="fallback">
      <h2>DON'T HAVE A SOLANA WALLET YET?</h2>
      <div class="wallets">
        <a class="btn altbtn" href="https://phantom.app" target="_blank" rel="noopener">Get Phantom</a>
        <a class="btn altbtn" href="https://solflare.com" target="_blank" rel="noopener">Get Solflare</a>
      </div>
    </div>

    <div class="mint">PIPRO token contract: ${PIPRO_MINT}</div>
  `;

  // A real click/tap is required — browsers block auto-redirects to custom
  // schemes on page load, so this can't fire itself on arrival.
  document.getElementById('openBtn').onclick = () => { location.href = solanaUri; };
  document.getElementById('copyAddrBtn').onclick = () => copy(to, 'Address');
  const copyAmtBtn = document.getElementById('copyAmtBtn');
  if (copyAmtBtn) { copyAmtBtn.onclick = () => copy(amount, 'Amount'); }
}
</script>
</body>
</html>
